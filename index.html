<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Overlay</title>
<link rel="icon" href="data:,">

<style>
body{
  margin:0;
  background:transparent;
  overflow:hidden;
}

/* GIF */
#imagem{
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1);
  width: 800px;
  height: 600px;
  object-fit: contain;
  opacity: 0;
  transition: opacity 0.7s ease, transform 0.7s ease;
}

/* CHAT */
#chat{
  position: fixed;
  left: 20px;
  bottom: 20px;
  width: 320px;
  font-family: Arial;
}

.msg {
  background: linear-gradient(90deg, rgba(0,0,0,0.8), rgba(0,0,0,0.4));
  margin: 6px;
  padding: 10px;
  border-radius: 10px;
  color: white;
  font-size: 14px;
  border-left: 4px solid #00ffcc;
  animation: slideFade 0.4s ease;
}

@keyframes slideFade {
  from {
    opacity: 0;
    transform: translateY(15px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>
<body>

<div id="chat"></div>
<img id="imagem">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// ================= FIREBASE =================
var firebaseConfig = {
  apiKey: "AIzaSyACKzi7eHGLRRhYyg1W6Zh7jWszkdrHDAw",
  authDomain: "gif-overlay-65024.firebaseapp.com",
  databaseURL: "https://gif-overlay-65024-default-rtdb.firebaseio.com",
  projectId: "gif-overlay-65024",
  storageBucket: "gif-overlay-65024.appspot.com",
  messagingSenderId: "6502465024",
  appId: "1:6502465024:web:overlay"
};

firebase.initializeApp(firebaseConfig);

var imagem = document.getElementById("imagem");

// 🎬 GIF
function mostrarGif(url){
  imagem.src = url;

  imagem.style.opacity = "0";
  imagem.style.transform = "translate(-50%, -50%) scale(0.9)";
  imagem.offsetHeight;

  imagem.style.opacity = "1";
  imagem.style.transform = "translate(-50%, -50%) scale(1)";

  setTimeout(() => {
    imagem.style.opacity = "0";
    imagem.style.transform = "translate(-50%, -50%) scale(1.1)";
  }, 5000);
}

firebase.database().ref("overlay").on("value", function(snapshot){
  var data = snapshot.val();
  if(data && data.imagem){
    mostrarGif(data.imagem);
  }
});

//////////////////////////////////////////////////
// 💬 FUNÇÃO GLOBAL DE CHAT (AGORA COM PLATAFORMA)
//////////////////////////////////////////////////

function addMessage(nome, texto, plataforma = "youtube"){
  const div = document.createElement("div");
  div.className = "msg";

  let tag = "";
  if(plataforma === "youtube") tag = "✔️ [  ▶︎ ] YouTube";
  if(plataforma === "twitch") tag = "☑️ TWITCH";

  div.innerHTML = `<b>${tag} ${nome}:</b> ${texto}`;

  const chat = document.getElementById("chat");
  chat.appendChild(div);

  if(chat.children.length > 8){
    chat.removeChild(chat.firstChild);
  }

  setTimeout(() => {
    if(div.parentNode){
      div.remove();
    }
  }, 50000);
}

// 🔴 YOUTUBE CHAT (AUTO + RETRY)
const API_KEY = "AIzaSyDoDTtN60hLIitjBW1YNxIQmuZW5YfflCg";
const CHANNEL_ID = "UC4kUqHcYkRz6t8XHk0v1xVw";

let liveChatId = null;
let nextPageToken = "";
let buscandoLive = false;

async function buscarLive(){
  if(buscandoLive) return;
  buscandoLive = true;

  try{
    const res = await fetch(
      `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`
    );

    const data = await res.json();

    if(data.items && data.items.length > 0){
      const videoId = data.items[0].id.videoId;
      console.log("🎥 Live encontrada:", videoId);

      await iniciarChat(videoId);
    } else {
      console.log("❌ Nenhuma live... tentando novamente");
      setTimeout(buscarLive, 10000);
    }

  }catch(e){
    console.log("⚠️ erro ao buscar live, retry...");
    setTimeout(buscarLive, 10000);
  }

  buscandoLive = false;
}

async function iniciarChat(videoId){
  try{
    const res = await fetch(
      `https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails&id=${videoId}&key=${API_KEY}`
    );

    const data = await res.json();

    if(!data.items || !data.items[0].liveStreamingDetails){
      console.log("⚠️ chat ainda não disponível...");
      setTimeout(buscarLive, 10000);
      return;
    }

    liveChatId = data.items[0].liveStreamingDetails.activeLiveChatId;
    console.log("💬 Chat conectado!");

    loopMensagens();

  }catch(e){
    console.log("⚠️ erro ao iniciar chat...");
    setTimeout(buscarLive, 10000);
  }
}

async function loopMensagens(){
  try{
    const res = await fetch(
      `https://www.googleapis.com/youtube/v3/liveChat/messages?liveChatId=${liveChatId}&part=snippet,authorDetails&key=${API_KEY}&pageToken=${nextPageToken}`
    );

    const data = await res.json();

    nextPageToken = data.nextPageToken;

    if(data.items){
      data.items.forEach(msg=>{
        const nome = msg.authorDetails.displayName;
        const texto = msg.snippet.displayMessage;

        addMessage(nome, texto, "youtube");
      });
    }

    setTimeout(loopMensagens, 3000);

  }catch(e){
    console.log("⚠️ erro no chat, reconectando...");
    setTimeout(buscarLive, 10000);
  }
}

// 🚀 iniciar sistema
buscarLive();

//////////////////////////////////////////////////
// 🚀 INICIAR TUDO
//////////////////////////////////////////////////

iniciarYT();

</script>

</body>
</html>
