<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Overlay</title>

<style>
body{
  margin:0;
  background:transparent;
  overflow:hidden;
}

/* 🎬 GIF */
#imagem{
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1);
  max-width: 70vw;
  max-height: 70vh;
  object-fit: contain;
  opacity: 0;
  transition: opacity 0.5s ease, transform 0.5s ease;
  filter: drop-shadow(0 0 20px rgba(0,255,255,0.7));
}

/* 💬 CHAT */
#chat{
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: 500px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  font-family: Arial;
}

/* ✨ MENSAGENS */
.msg{
  background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(30,30,30,0.7));
  backdrop-filter: blur(6px);

  margin: 10px 0;
  padding: 10px 14px;

  color: white;
  font-size: 20px;
  font-weight: 600;

  border-radius: 12px;

  border: 1px solid rgba(255,255,255,0.1);

  box-shadow:
    0 0 10px rgba(0,0,0,0.5),
    0 0 20px rgba(0,255,255,0.2);

  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateX(60px) scale(0.9);
  }
  to {
    opacity: 1;
    transform: translateX(0) scale(1);
  }
}

@keyframes fadeOut {
  from {
    opacity: 1;
    transform: translateX(0);
  }
  to {
    opacity: 0;
    transform: translateX(40px);
  }
}
</style>
</head>
<body>

<div id="chat"></div>
<img id="imagem">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// ================= FIREBASE =================
var firebaseConfig = {
  apiKey: "SUA_KEY",
  databaseURL: "SUA_DATABASE_URL"
};

firebase.initializeApp(firebaseConfig);

// ================= GIF =================
var imagem = document.getElementById("imagem");

firebase.database().ref("overlay").on("value", function(snapshot){
  var data = snapshot.val();

  if(data && data.imagem){
    imagem.src = data.imagem;

    imagem.style.opacity = "0";
    imagem.style.transform = "translate(-50%, -50%) scale(0.7)";
    imagem.offsetHeight;

    imagem.style.opacity = "1";
    imagem.style.transform = "translate(-50%, -50%) scale(1)";

    setTimeout(()=>{
      imagem.style.opacity = "0";
      imagem.style.transform = "translate(-50%, -50%) scale(1.2)";
    },5000);
  }
});

// ================= CHAT =================
const chat = document.getElementById("chat");

function addMessage(nome, texto, plataforma = "youtube", tipo = {}){
  const div = document.createElement("div");
  div.className = "msg";

  let badge = "";

  if(plataforma === "youtube"){
    badge = "▶";
    if(tipo.owner) badge += " 👑";
    if(tipo.mod) badge += " 🛡️";
    if(tipo.member) badge += " ⭐";
  }

  if(plataforma === "twitch"){
    badge = "🟪";
  }

  const cor = "#" + Math.floor(Math.random()*16777215).toString(16);

  div.innerHTML = `<b style="color:${cor}">${badge} ${nome}:</b> ${texto}`;

  chat.appendChild(div);

  if(chat.children.length > 8){
    chat.removeChild(chat.firstChild);
  }

  setTimeout(() => {
    div.style.animation = "fadeOut 0.4s ease forwards";
    setTimeout(() => div.remove(), 400);
  }, 50000);
}
