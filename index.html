<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Overlay</title>
<link rel="icon" href="data:,">

<style>
body{
  margin:0;
  background:transparent;
  overflow:hidden;
}

/* GIF */
#imagem{
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1);
  width: 800px;
  height: 600px;
  object-fit: contain;
  opacity: 0;
  transition: opacity 0.7s ease, transform 0.7s ease;
}

/* CHAT */
#chat{
  position: fixed;
  left: 20px;
  bottom: 20px;
  width: 320px;
  font-family: Arial;
}

.msg {
  background: linear-gradient(90deg, rgba(0,0,0,0.8), rgba(0,0,0,0.4));
  margin: 6px;
  padding: 10px;
  border-radius: 10px;
  color: white;
  font-size: 14px;
  border-left: 4px solid #00ffcc;
  animation: slideFade 0.4s ease;
}

@keyframes slideFade {
  from {
    opacity: 0;
    transform: translateY(15px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>
<body>

<div id="chat"></div>
<img id="imagem">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// ================= FIREBASE =================
var firebaseConfig = {
  apiKey: "AIzaSyACKzi7eHGLRRhYyg1W6Zh7jWszkdrHDAw",
  authDomain: "gif-overlay-65024.firebaseapp.com",
  databaseURL: "https://gif-overlay-65024-default-rtdb.firebaseio.com",
  projectId: "gif-overlay-65024",
  storageBucket: "gif-overlay-65024.appspot.com",
  messagingSenderId: "6502465024",
  appId: "1:6502465024:web:overlay"
};

firebase.initializeApp(firebaseConfig);

var imagem = document.getElementById("imagem");

// 🎬 GIF
function mostrarGif(url){
  imagem.src = url;

  imagem.style.opacity = "0";
  imagem.style.transform = "translate(-50%, -50%) scale(0.9)";
  imagem.offsetHeight;

  imagem.style.opacity = "1";
  imagem.style.transform = "translate(-50%, -50%) scale(1)";

  setTimeout(() => {
    imagem.style.opacity = "0";
    imagem.style.transform = "translate(-50%, -50%) scale(1.1)";
  }, 5000);
}

firebase.database().ref("overlay").on("value", function(snapshot){
  var data = snapshot.val();
  if(data && data.imagem){
    mostrarGif(data.imagem);
  }
});
