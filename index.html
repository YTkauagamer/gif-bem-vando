body{

/* 🎬 GIF */
#imagem{
  position: fixed;
  top: 50%;

  transform: translate(-50%, -50%) scale(1);

/* ✨ MENSAGENS TRANSPARENTES */

  font-size: 20px;

  animation: slideIn 0.7s ease;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateX(60px) scale(0.9);
  }
  to {
    opacity: 1;
    transform: translateX(0) scale(1);
  }
}

firebase.database().ref("overlay").on("value", function(snapshot){

function addMessage(nome, texto, plataforma = "youtube", tipo = {}){

  if(plataforma === "youtube"){

    if(tipo.mod) badge += " ✅";
  }

  div.innerHTML = `<b>${badge} ${nome}:</b> ${texto}`;

  chat.appendChild(div);

  if(chat.children.length > 8){
    chat.removeChild(chat.firstChild);
  }

  setTimeout(() => {
    if(div.parentNode){
      div.remove();
    }
  }, 40000);
}

const API_KEY = "AIzaSyDoDTtN60hLIitjBW1YNxIQmuZW5YfflCg";

const mensagensLidas = new Set();

// ================= EXTRAIR VIDEO ID =================
function extrairVideoID(texto){

  if(!texto) return null;

  texto = texto.trim();

  if(texto.includes("watch?v=")){
    return texto.split("watch?v=")[1].split("&")[0];
  }

  if(texto.includes("/live/")){
    return texto.split("/live/")[1].split("?")[0];
  }

  if(texto.includes("youtu.be/")){
    return texto.split("youtu.be/")[1].split("?")[0];
  }

  if(texto.length >= 11){
    return texto.substring(0,11);
  }

  return null;
}

// ================= CONECTAR YOUTUBE =================
async function conectarYoutube(videoId){

  try{

    console.log("🎥 conectando:", videoId);

    const res = await fetch(
      `https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails&id=${videoId}&key=${API_KEY}`
    );

    const json = await res.json();

    console.log(json);

    if(
      json.items &&
      json.items[0] &&
      json.items[0].liveStreamingDetails &&
      json.items[0].liveStreamingDetails.activeLiveChatId
    ){

      liveChatId =
        json.items[0].liveStreamingDetails.activeLiveChatId;

      nextPageToken = "";
      mensagensLidas.clear();

      console.log("💬 CHAT YOUTUBE CONECTADO");

      if(!ytLoopRodando){
        ytLoopRodando = true;
        buscarMensagensYT();
      }

    }else{

      console.log("❌ live sem chat");

      setTimeout(()=>{
        conectarYoutube(videoId);
      },10000);

    }

  }catch(e){

    console.log("❌ erro conectar youtube:", e);

    setTimeout(()=>{
      conectarYoutube(videoId);
    },10000);

  }
}

// ================= LOOP CHAT =================
async function buscarMensagensYT(){

  if(!liveChatId){
    ytLoopRodando = false;
    return;
  }

  try{

    const res = await fetch(
      `https://www.googleapis.com/youtube/v3/liveChat/messages?liveChatId=${liveChatId}&part=id,snippet,authorDetails&key=${API_KEY}&pageToken=${nextPageToken}`
    );

    const data = await res.json();

    // quota ou erro
    if(data.error){

      console.log("❌ erro youtube:", data.error);

      setTimeout(buscarMensagensYT, 10000);
      return;
    }

    nextPageToken = data.nextPageToken || "";

    if(data.items){

      data.items.forEach(msg => {

        // evitar duplicadas
        if(mensagensLidas.has(msg.id)){
          return;
        }

        mensagensLidas.add(msg.id);

        // limitar memória
        if(mensagensLidas.size > 5000){
          mensagensLidas.clear();
        }

        if(chatAtivo){

          addMessage(
            msg.authorDetails.displayName,
            msg.snippet.displayMessage,
            "youtube",
            {
              owner: msg.authorDetails.isChatOwner,
              mod: msg.authorDetails.isChatModerator,
              member: msg.authorDetails.isChatSponsor
            }
          );

        }

      });

    }

    const tempo =
      data.pollingIntervalMillis || 2000;

    setTimeout(buscarMensagensYT, tempo);

  }catch(e){

    console.log("❌ erro lendo chat:", e);

    setTimeout(buscarMensagensYT, 5000);

  }
}
