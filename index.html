<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Overlay</title>

<style>
body{
  margin:0;
  background:transparent;
  overflow:hidden;
}

/* 🎬 GIF */
#imagem{
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1);
  width: 800px;
  height: 600px;
  object-fit: contain;
  opacity: 0;
  transition: opacity 0.7s ease, transform 0.7s ease;
}

/* 💬 TWITCH CHAT */
#chat{
  position: fixed;
  left: 20px;
  bottom: 20px;
  width: 320px;
  font-family: Arial;
}

.msg{
  background: rgba(0,0,0,0.8);
  margin: 6px;
  padding: 10px;
  border-radius: 10px;
  color: white;
  font-size: 14px;
}

/* 🔴 YOUTUBE CHAT */
#ytchat{
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: 350px;
  height: 500px;
  border: none;
}
</style>
</head>
<body>

<!-- TWITCH -->
<div id="chat"></div>

<!-- YOUTUBE -->
<iframe id="ytchat"></iframe>

<!-- GIF -->
<img id="imagem">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// ================= FIREBASE =================
var firebaseConfig = {
  apiKey: "AIzaSyACKzi7eHGLRRhYyg1W6Zh7jWszkdrHDAw",
  databaseURL: "https://gif-overlay-65024-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

// 🎬 GIF
var imagem = document.getElementById("imagem");

firebase.database().ref("overlay").on("value", function(snapshot){
  var data = snapshot.val();

  if(data && data.imagem){
    imagem.src = data.imagem;

    imagem.style.opacity = "0";
    imagem.style.transform = "translate(-50%, -50%) scale(0.9)";
    imagem.offsetHeight;

    imagem.style.opacity = "1";
    imagem.style.transform = "translate(-50%, -50%) scale(1)";

    setTimeout(()=>{
      imagem.style.opacity = "0";
      imagem.style.transform = "translate(-50%, -50%) scale(1.1)";
    },5000);
  }
});

// 💬 TWITCH CHAT
function addMessage(nome, texto){
  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = `<b>${nome}:</b> ${texto}`;

  const chat = document.getElementById("chat");
  chat.appendChild(div);

  if(chat.children.length > 8){
    chat.removeChild(chat.firstChild);
  }
}

const socket = new WebSocket("wss://irc-ws.chat.twitch.tv:443");

socket.onopen = () => {
  socket.send("PASS SCHMOOPIIE");
  socket.send("NICK justinfan" + Math.floor(Math.random()*100000));
  socket.send("JOIN #youtubekaua");
};

socket.onmessage = (event) => {
  const msg = event.data;

  if(msg.includes("PRIVMSG")){
    const nome = msg.split("!")[0].substring(1);
    const texto = msg.split("PRIVMSG")[1].split(":")[1];

    addMessage(nome, texto);
  }
};

// 🔴 YOUTUBE CHAT (CONTROLADO PELO PAINEL)
firebase.database().ref("chatYoutube").on("value", function(snapshot){
  const data = snapshot.val();

  if(data && data.videoId){
    const iframe = document.getElementById("ytchat");

    iframe.src = `https://www.youtube.com/live_chat?v=${data.videoId}&embed_domain=ytkauagamer.github.io`;
  }
});
</script>

</body>
</html>
