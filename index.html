<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Overlay</title>

<style>
body{
  margin:0;
  background:transparent;
  overflow:hidden;
}

/* 🎬 GIF */
#imagem{
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1);
  width: 800px;
  height: 600px;
  object-fit: contain;
  opacity: 0;
  transition: opacity 0.7s ease, transform 0.7s ease;
}

/* 💬 CHAT */
#chat{
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: 500px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  font-family: Arial;
}

/* 💎 MENSAGEM ESTILO STREAMLABS */
.msg{
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(6px);

  margin: 10px 0;
  padding: 10px 14px;
  border-radius: 12px;

  font-size: 22px;
  font-weight: bold;
  color: white;

  text-align: right;

  box-shadow: 0 10px 25px rgba(0,0,0,0.6);

  animation: slideRobusto 0.45s cubic-bezier(.22,1.2,.36,1);
}

@keyframes slideRobusto{
  0%{
    opacity: 0;
    transform: translateX(80px) scale(0.95);
  }
  60%{
    opacity: 1;
    transform: translateX(-5px) scale(1.02);
  }
  100%{
    transform: translateX(0) scale(1);
  }
}

.nome{
  font-weight: bold;
  margin-right: 6px;
}

.texto{
  color: #fff;
}
</style>
</head>
<body>

<div id="chat"></div>
<img id="imagem">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// ================= FIREBASE =================
var firebaseConfig = {
  apiKey: "AIzaSyACKzi7eHGLRRhYyg1W6Zh7jWszkdrHDAw",
  databaseURL: "https://gif-overlay-65024-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

// ================= GIF =================
var imagem = document.getElementById("imagem");

firebase.database().ref("overlay").on("value", function(snapshot){
  var data = snapshot.val();

  if(data && data.imagem){
    imagem.src = data.imagem;

    imagem.style.opacity = "0";
    imagem.style.transform = "translate(-50%, -50%) scale(0.9)";
    imagem.offsetHeight;

    imagem.style.opacity = "1";
    imagem.style.transform = "translate(-50%, -50%) scale(1)";

    setTimeout(()=>{
      imagem.style.opacity = "0";
      imagem.style.transform = "translate(-50%, -50%) scale(1.1)";
    },5000);
  }
});

// ================= CORES =================
function getRandomColor(){
  const cores = [
    "#ff4d4d", "#4dd2ff", "#ffd24d",
    "#4dff88", "#ff66cc", "#66a3ff",
    "#ff944d", "#00ffcc"
  ];
  return cores[Math.floor(Math.random() * cores.length)];
}

// ================= CHAT =================
function addMessage(nome, texto, plataforma = "youtube", tipo = {}){
  const div = document.createElement("div");
  div.className = "msg";

  let badge = "";
  let nomeColor = getRandomColor();

  if(plataforma === "youtube"){
    badge = "▶";

    if(tipo.owner){
      badge += " 👑";
      nomeColor = "#ffd700";
    }
    else if(tipo.mod){
      badge += " 🛡️";
      nomeColor = "#00ffcc";
    }
    else if(tipo.member){
      badge += " ⭐";
      nomeColor = "#ff66cc";
    }
  }

  if(plataforma === "twitch"){
    badge = "🟪";
    nomeColor = "#9146FF";
  }

  div.innerHTML = `
    <span class="nome" style="color:${nomeColor}">
      ${badge} ${nome}:
    </span>
    <span class="texto">${texto}</span>
  `;

  const chat = document.getElementById("chat");
  chat.appendChild(div);

  if(chat.children.length > 8){
    chat.removeChild(chat.firstChild);
  }

  setTimeout(() => {
    if(div.parentNode){
      div.remove();
    }
  }, 50000);
}

// ================= YOUTUBE API =================
const API_KEY = "AIzaSyDoDTtN60hLIitjBW1YNxIQmuZW5YfflCg";

let liveChatId = null;
let nextPageToken = "";

firebase.database().ref("chatYoutube").on("value", async function(snapshot){
  const data = snapshot.val();
  if(!data || !data.videoId) return;

  const videoId = data.videoId;

  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails&id=${videoId}&key=${API_KEY}`
  );

  const json = await res.json();

  if(json.items && json.items[0]){
    liveChatId = json.items[0].liveStreamingDetails.activeLiveChatId;
    nextPageToken = "";
    buscarMensagensYT();
  }
});

async function buscarMensagensYT(){
  if(!liveChatId) return;

  try{
    const res = await fetch(
      `https://www.googleapis.com/youtube/v3/liveChat/messages?liveChatId=${liveChatId}&part=snippet,authorDetails&key=${API_KEY}&pageToken=${nextPageToken}`
    );

    const data = await res.json();

    nextPageToken = data.nextPageToken || "";

    if(data.items){
      data.items.forEach(msg=>{
        addMessage(
          msg.authorDetails.displayName,
          msg.snippet.displayMessage,
          "youtube",
          {
            owner: msg.authorDetails.isChatOwner,
            mod: msg.authorDetails.isChatModerator,
            member: msg.authorDetails.isChatSponsor
          }
        );
      });
    }

  }catch(e){
    console.log("Erro YT:", e);
  }

  setTimeout(buscarMensagensYT, 3000);
}

// ================= TWITCH =================
const socket = new WebSocket("wss://irc-ws.chat.twitch.tv:443");

socket.onopen = () => {
  socket.send("PASS SCHMOOPIIE");
  socket.send("NICK justinfan" + Math.floor(Math.random()*100000));
  socket.send("JOIN #youtubekaua");
};

socket.onmessage = (event) => {
  const msg = event.data;

  if(msg.includes("PRIVMSG")){
    const nome = msg.split("!")[0].substring(1);
    const texto = msg.split("PRIVMSG")[1].split(":")[1];

    addMessage(nome, texto, "twitch");
  }
};
</script>

</body>
</html>
