<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Overlay PRO</title>

<style>
body{
  margin:0;
  background:transparent;
  overflow:hidden;
}

/* 🎬 GIF */
#imagem{
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1);
  width: 800px;
  height: 600px;
  object-fit: contain;
  opacity: 0;
  transition: 0.7s;
}

/* 💬 TWITCH CHAT */
#chat{
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: 400px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  font-family: Arial;
}

/* 💎 MENSAGENS */
.msg{
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(6px);
  margin: 10px 0;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 20px;
  color: white;
  text-align: right;
  animation: slide 0.4s;
}

@keyframes slide{
  from{
    opacity:0;
    transform: translateX(50px);
  }
  to{
    opacity:1;
    transform: translateX(0);
  }
}

/* 🔴 YOUTUBE CHAT (iframe) */
#ytchat{
  position: fixed;
  left: 20px;
  bottom: 20px;
  width: 400px;
  height: 600px;
  border: none;
  opacity: 0.85;
  border-radius: 10px;
  overflow: hidden;
}
</style>
</head>
<body>

<!-- 🎬 GIF -->
<img id="imagem">

<!-- 💬 TWITCH -->
<div id="chat"></div>

<!-- 🔴 YOUTUBE (PRO) -->
<iframe 
  id="ytchat"
  src="https://www.youtube.com/live_chat?v=CJrKRyDtKB8&embed_domain=ytkauagamer.github.io">
</iframe>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// ================= FIREBASE =================
var firebaseConfig = {
  apiKey: "AIzaSyACKzi7eHGLRRhYyg1W6Zh7jWszkdrHDAw",
  databaseURL: "https://gif-overlay-65024-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

// ================= GIF =================
var imagem = document.getElementById("imagem");

firebase.database().ref("overlay").on("value", function(snapshot){
  var data = snapshot.val();

  if(data && data.imagem){
    imagem.src = data.imagem;

    imagem.style.opacity = "0";
    imagem.style.transform = "translate(-50%, -50%) scale(0.9)";
    imagem.offsetHeight;

    imagem.style.opacity = "1";
    imagem.style.transform = "translate(-50%, -50%) scale(1)";

    setTimeout(()=>{
      imagem.style.opacity = "0";
      imagem.style.transform = "translate(-50%, -50%) scale(1.1)";
    },5000);
  }
});

// ================= TWITCH =================
const socket = new WebSocket("wss://irc-ws.chat.twitch.tv:443");

socket.onopen = () => {
  socket.send("PASS SCHMOOPIIE");
  socket.send("NICK justinfan" + Math.floor(Math.random()*100000));
  socket.send("JOIN #youtubekaua");
};

socket.onmessage = (event) => {
  const msg = event.data;

  if(msg.includes("PRIVMSG")){
    const nome = msg.split("!")[0].substring(1);
    const texto = msg.split("PRIVMSG")[1].split(":")[1];

    addMessage(nome, texto);
  }
};

function addMessage(nome, texto){
  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = `<b>${nome}:</b> ${texto}`;

  const chat = document.getElementById("chat");
  chat.appendChild(div);

  if(chat.children.length > 8){
    chat.removeChild(chat.firstChild);
  }

  setTimeout(()=>{
    if(div.parentNode){
      div.remove();
    }
  }, 30000);
}
</script>

</body>
</html>
