<script>
// 🔥 FIREBASE (SEU SISTEMA DE GIF)
var firebaseConfig = {
  apiKey: "AIzaSyACKzi7eHGLRRhYyg1W6Zh7jWszkdrHDAw",
  authDomain: "gif-overlay-65024.firebaseapp.com",
  databaseURL: "https://gif-overlay-65024-default-rtdb.firebaseio.com",
  projectId: "gif-overlay-65024",
  storageBucket: "gif-overlay-65024.appspot.com",
  messagingSenderId: "6502465024",
  appId: "1:6502465024:web:overlay"
};

firebase.initializeApp(firebaseConfig);

var imagem = document.getElementById("imagem");

// 🔥 GIF COM ANIMAÇÃO MELHORADA (PASSO 3)
function mostrarGif(url){
  imagem.src = url;

  imagem.style.opacity = "0";
  imagem.style.transform = "translate(-50%, -50%) scale(0.9)";

  imagem.offsetHeight;

  imagem.style.opacity = "1";
  imagem.style.transform = "translate(-50%, -50%) scale(1)";

  setTimeout(() => {
    imagem.style.opacity = "0";
    imagem.style.transform = "translate(-50%, -50%) scale(1.1)";
  }, 5000);
}

// 🔥 RECEBER GIF DO FIREBASE
firebase.database().ref("overlay").on("value", function(snapshot){
  var data = snapshot.val();

  if(data && data.imagem){
    mostrarGif(data.imagem);
  }
});

//////////////////////////////////////////////////
// 💬 CHAT DO YOUTUBE
//////////////////////////////////////////////////

const API_KEY = "AIzaSyDoDTtN60hLIitjBW1YNxIQmuZW5YfflCg";
const CHANNEL_ID = "UC4kUqHcYkRz6t8XHk0v1xVw";

let liveChatId = null;
let nextPageToken = "";

// pegar live ativa
async function getLiveVideoId(){
  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`
  );

  const data = await res.json();
  return data.items[0]?.id?.videoId;
}

// pegar chatId
async function getChatId(videoId){
  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails&id=${videoId}&key=${API_KEY}`
  );

  const data = await res.json();
  return data.items[0].liveStreamingDetails.activeLiveChatId;
}

// buscar mensagens
async function getMessages(){
  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/liveChat/messages?liveChatId=${liveChatId}&part=snippet,authorDetails&key=${API_KEY}&pageToken=${nextPageToken}`
  );

  const data = await res.json();
  nextPageToken = data.nextPageToken;

  data.items.forEach(msg=>{
    const nome = msg.authorDetails.displayName;
    const texto = msg.snippet.displayMessage;

    addMessage(nome, texto);
  });
}

// mostrar mensagens na tela
function addMessage(nome, texto){
  const div = document.createElement("div");
  div.className = "msg";

  div.innerHTML = `<b>${nome}:</b> ${texto}`;

  const chat = document.getElementById("chat");
  chat.appendChild(div);

  // limite de mensagens
  if(chat.children.length > 8){
    chat.removeChild(chat.firstChild);
  }

  // remover após 50 segundos (SEU PEDIDO)
  setTimeout(() => {
    if(div.parentNode){
      div.remove();
    }
  }, 50000);
}

// iniciar chat
async function iniciarChat(){
  const videoId = await getLiveVideoId();

  if(!videoId){
    console.log("Sem live");
    return;
  }

  liveChatId = await getChatId(videoId);

  setInterval(getMessages, 3000);
}

iniciarChat();

</script>
