<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Overlay</title>

<style>
body{
  margin:0;
  background:transparent;
  overflow:hidden;
}

/* 🎬 GIF */
#imagem{
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1);
  width: 800px;
  height: 600px;
  object-fit: contain;
  opacity: 0;
  transition: opacity 0.7s ease, transform 0.7s ease;
}

/* 💬 CHAT */
#chat{
  position: fixed;
  right: 0;
  bottom: 0;

  width: 800px;
  height: 600px;

  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: flex-end;

  padding: 10px;
  box-sizing: border-box;

  font-family: Arial;
  overflow: hidden;
}

/* ✨ MENSAGENS TRANSPARENTES */
.msg{
  background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(30,30,30,0.7));
  backdrop-filter: blur(6px);

  margin: 10px 0;
  padding: 10px 14px;

  color: white;
  font-size: 20px;
  font-weight: 600;

  border-radius: 12px;

  border: 1px solid rgba(255,255,255,0.1);

  box-shadow:
    0 0 10px rgba(0,0,0,0.5),
    0 0 20px rgba(0,255,255,0.2);

  animation: slideIn 0.7s ease;

  word-break: break-word;
}

/* emojis youtube */
img.emoji{
  width: 24px;
  height: 24px;
  vertical-align: middle;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateX(60px) scale(0.9);
  }
  to {
    opacity: 1;
    transform: translateX(0) scale(1);
  }
}
</style>
</head>
<body>

<div id="chat"></div>
<img id="imagem">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="/socket.io/socket.io.js"></script>

<script>

// ================= FIREBASE =================
var firebaseConfig = {
  apiKey: "AIzaSyACKzi7eHGLRRhYyg1W6Zh7jWszkdrHDAw",
  databaseURL: "https://gif-overlay-65024-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

// ================= GIF =================
var imagem = document.getElementById("imagem");

firebase.database().ref("overlay").on("value", function(snapshot){
  var data = snapshot.val();

  if(data && data.imagem){
    imagem.src = data.imagem;

    imagem.style.opacity = "0";
    imagem.style.transform = "translate(-50%, -50%) scale(0.9)";
    imagem.offsetHeight;

    imagem.style.opacity = "1";
    imagem.style.transform = "translate(-50%, -50%) scale(1)";

    setTimeout(()=>{
      imagem.style.opacity = "0";
      imagem.style.transform = "translate(-50%, -50%) scale(1.1)";
    },5000);
  }
});

// ================= CHAT =================
const chat = document.getElementById("chat");

let chatAtivo = true;

function addMessage(nome, texto, plataforma = "youtube", tipo = {}){
  const div = document.createElement("div");
  div.className = "msg";

  let badge = "";

  if(plataforma === "youtube"){
    badge = "🟥⃢▸";
    if(tipo.owner) badge += " 👑";
    if(tipo.mod) badge += " ✅";
    if(tipo.member) badge += " ⭐";
  }

  if(plataforma === "twitch"){
    badge = "☑️";
    if(tipo.owner) badge += " 👑";
    if(tipo.mod) badge += " ✅";
  }

  div.innerHTML = `<b>${badge} ${nome}:</b> ${texto}`;

  chat.appendChild(div);

  if(chat.children.length > 8){
    chat.removeChild(chat.firstChild);
  }

  setTimeout(() => {
    if(div.parentNode){
      div.remove();
    }
  }, 40000);
}

// ================= CONTROLE CHAT =================
firebase.database().ref("config/chatAtivo").on("value", (snapshot) => {

  if(snapshot.val() === false){
    chatAtivo = false;
    console.log("⛔ chats pausados");
  }else{
    chatAtivo = true;
    console.log("▶️ chats ativos");
  }

});

// ================= YOUTUBE CHAT NOVO =================

const ytSocket = io();

ytSocket.on("mensagem", (msg) => {

  if(!chatAtivo) return;

  addMessage(
    msg.nome,
    msg.mensagem,
    "youtube",
    {
      owner: msg.owner,
      mod: msg.mod,
      member: msg.member
    }
  );

});

// ================= TWITCH =================
const socket = new WebSocket("wss://irc-ws.chat.twitch.tv:443");

socket.onopen = () => {
  socket.send("PASS SCHMOOPIIE");
  socket.send("NICK justinfan" + Math.floor(Math.random()*100000));
  socket.send("JOIN #ishowspeed");
};

socket.onmessage = (event) => {
  const msg = event.data;

  if(chatAtivo && msg.includes("PRIVMSG")){
    const nome = msg.split("!")[0].substring(1);
    const texto = msg.split("PRIVMSG")[1].split(":")[1];

    addMessage(nome, texto, "twitch");
  }
};

</script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">

</body>
</html>
