<script>
var firebaseConfig = {
  apiKey: "AIzaSyACKzi7eHGLRRhYyg1W6Zh7jWszkdrHDAw",
  databaseURL: "https://gif-overlay-65024-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

// 🎬 GIF
function enviarGif(url){
  firebase.database().ref("overlay").set({
    imagem: url
  });
}

// 📺 CHAT
function atualizarChat(){
  const link = document.getElementById("liveLink").value;

  if(!link){
    alert("Cola o link da live");
    return;
  }

  let videoId = "";

  if(link.includes("watch?v=")){
    videoId = link.split("v=")[1].split("&")[0];
  }
  else if(link.includes("/live/")){
    videoId = link.split("/live/")[1].split("?")[0];
  }
  else{
    alert("Link inválido");
    return;
  }

  firebase.database().ref("chatYoutube").set({
    videoId: videoId
  });

  alert("Chat atualizado!");
}
</script>

<h2>YouTube Canal 📺</h2>

id="canalYoutube"

width:420px;

"
>

<button onclick="salvarCanalYoutube()">
Salvar Canal
</button>

<script>

function extrairVideoId(url){

  const regex =
    /(?:youtube\.com\/live\/|youtu\.be\/|v=)([^?&]+)/;

  const match = url.match(regex);

  return match ? match[1] : url;
}

function salvarLiveYoutube(){

  const url =
    document.getElementById("liveYoutube").value;

  const videoId = extrairVideoId(url);

  firebase.database().ref("chatYoutube").set({
    videoId: videoId
  });

  console.log("Live salva:", videoId);
}

function salvarCanalYoutube(){

  const canal =
    document.getElementById("canalYoutube").value;

  firebase.database().ref("youtubeCanal").set({
    canal: canal
  });

  console.log("Canal salvo:", canal);
}
<h2>🎵 Tocar áudio</h2>

<input type="text" id="audioUrl"
placeholder="Cole URL do áudio">

<button onclick="tocarAudio()">
Tocar áudio
</button>

<button onclick="pararAudio()">
Parar áudio
</button>

<script>
function tocarAudio(){

  const url =
    document.getElementById("audioUrl").value;

  firebase.database().ref("audio").set({
    url: url,
    tocar: true,
    tempo: Date.now()
  });

}

function pararAudio(){

  firebase.database().ref("audio").set({
    parar: true,
    tempo: Date.now()
  });

}
    // ================= ÁUDIO OVERLAY =================

const playerAudio = new Audio();

playerAudio.volume = 1.0;

firebase.database().ref("audio").on("value", (snapshot)=>{

  const data = snapshot.val();

  if(!data) return;

  // tocar áudio
  if(data.tocar && data.url){

    playerAudio.pause();

    playerAudio.src = data.url;

    playerAudio.currentTime = 0;

    playerAudio.play()
    .catch(err=>{
      console.log("erro áudio:", err);
    });

  }

  // parar áudio
  if(data.parar){

    playerAudio.pause();

    playerAudio.currentTime = 0;

  }

});

</script>
</script>
