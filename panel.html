/* 🔥 DIVISÓRIA */
.divisor{

  margin:40px auto;
  border-top:2px solid rgba(255,255,255,0.2);

}

.divisor span{
  position:absolute;
  top:-12px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:0 15px;
  color:#00ffcc;

/* 📺 ÁREA DO CHAT */
.chat-control{
  margin-top:30px;
}

input{
  padding:12px;
  width:320px;
  border-radius:8px;
  border:none;
  margin-top:10px;

<!-- 📺 CONTROLE DO CHAT -->

<h2>Atualizar Chat YouTube</h2>

<input id="liveLink" placeholder="Cole o link da live aqui">

<br><br>

<button onclick="atualizarChat()">Atualizar Chat</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyACKzi7eHGLRRhYyg1W6Zh7jWszkdrHDAw",
  databaseURL: "https://gif-overlay-65024-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

// 🎬 GIF
function enviarGif(url){
  firebase.database().ref("overlay").set({
    imagem: url
  });
}

// 📺 CHAT
function atualizarChat(){
  const link = document.getElementById("liveLink").value;

  if(!link){
    alert("Cola o link da live");
    return;
  }

  let videoId = "";

  if(link.includes("watch?v=")){
    videoId = link.split("v=")[1].split("&")[0];
  }
  else if(link.includes("/live/")){
    videoId = link.split("/live/")[1].split("?")[0];
  }
  else{
    alert("Link inválido");
    return;
  }

  firebase.database().ref("chatYoutube").set({
    videoId: videoId
  });

  alert("Chat atualizado!");
}
</script>
